name: DesktopAutomationRecorder
options:
  bundleIdPrefix: com.automationrecorder
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  DesktopAutomationRecorder:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Resources/Info.plist
    entitlements:
      path: Resources/DesktopAutomationRecorder.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.automationrecorder.DesktopAutomationRecorder
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/DesktopAutomationRecorder.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: ""
    dependencies:
      - framework: Cocoa.framework
        embed: false
      - framework: Carbon.framework
        embed: false
      - framework: Vision.framework
        embed: false
      - framework: ScreenCaptureKit.framework
        embed: false
